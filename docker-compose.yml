version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: intern-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - intern-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: intern-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/intern_portal
      JWT_KEY: your_jwt_key
      SESSION_KEY: your_session_key
      PYTHON_SERVICE_URL: http://python-service:5001
      NODE_ENV: production
    depends_on:
      - mongodb
    networks:
      - intern-network
    volumes:
      - ./server/uploads:/app/uploads

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: intern-python-service
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      FLASK_PORT: 5001
    networks:
      - intern-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: intern-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - intern-network

volumes:
  mongo_data:

networks:
  intern-network:
    driver: bridge
