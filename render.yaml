# Render Blueprint — Intern Portal
# In Render: New → Blueprint → connect repo Tameerkhan9/For_Intern (branch main)
#
# You will be prompted for:
#   MONGODB_URI  → MongoDB Atlas connection string (.../intern_portal)
#   CORS_ORIGIN  → set after first deploy to your static site URL
#   REACT_APP_API_URL → https://<api-service>.onrender.com/api

services:
  - type: web
    name: intern-portal-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_KEY
        generateValue: true
      - key: SESSION_KEY
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: intern-portal-web
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
