# Render Blueprint — Intern Portal (ONE Web Service)
# New → Blueprint → Tameerkhan9/For_Intern
# Or Web Service with Build = npm run build, Start = npm start

services:
  - type: web
    name: intern-portal
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_KEY
        generateValue: true
      - key: SESSION_KEY
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
